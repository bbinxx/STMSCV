<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0b0f19',
                        panel: '#11151e',
                        card: '#161b28',
                        accent: '#6366f1',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-dark text-slate-200 font-sans min-h-screen flex items-center justify-center p-6">
    <div class="bg-panel w-full max-w-md border border-gray-800 rounded-xl shadow-2xl overflow-hidden">
        <div class="bg-card p-6 border-b border-gray-800 text-center">
            <h2 class="text-xl font-bold flex items-center justify-center gap-3">
                <i class="fa-solid fa-server text-accent"></i> Connection Settings
            </h2>
            <div class="mt-2 text-sm font-medium">
                <span class="text-gray-500 uppercase tracking-widest text-[10px]">CARLA Status:</span>
                <span class="text-amber-500 ml-1">{{ status }}</span>
            </div>
        </div>

        <form method="POST" class="p-8 space-y-6">
            <div class="space-y-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest">CARLA Host</label>
                    <input type="text" name="carla_host" value="{{ config.carla_host }}"
                        class="bg-gray-900 border border-gray-700 rounded-md px-4 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest">CARLA Port</label>
                        <input type="number" name="carla_port" value="{{ config.carla_port }}"
                            class="bg-gray-900 border border-gray-700 rounded-md px-4 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest">Timeout (s)</label>
                        <input type="number" step="0.1" name="carla_timeout" value="{{ config.carla_timeout }}"
                            class="bg-gray-900 border border-gray-700 rounded-md px-4 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all">
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-800">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest">YOLO Model
                            Path</label>
                        <input type="text" name="yolo_model" value="{{ config.yolo_model }}"
                            class="bg-gray-900 border border-gray-700 rounded-md px-4 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all">
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-800 grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest">Flask Host</label>
                        <input type="text" name="flask_host" value="{{ config.flask_host }}"
                            class="bg-gray-900 border border-gray-700 rounded-md px-4 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest">Flask Port</label>
                        <input type="number" name="flask_port" value="{{ config.flask_port }}"
                            class="bg-gray-900 border border-gray-700 rounded-md px-4 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all">
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-800">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest">Live Feed
                            Address</label>
                        <input type="text" name="live_feed_url" value="{{ config.live_feed_url }}"
                            placeholder="e.g. 127.0.0.1:5050"
                            class="bg-gray-900 border border-gray-700 rounded-md px-4 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent transition-all">
                        <p class="text-[9px] text-gray-500 italic">Enter the address (host:port). The path
                            /api/live_feed is added automatically if not present.</p>
                    </div>
                </div>
            </div>

            <button type="submit" name="action" value="save_connect"
                class="w-full bg-accent hover:bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg shadow-lg shadow-accent/20 transition-all active:scale-95 uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Save & Connect
            </button>
        </form>

        <div class="bg-gray-900/50 px-8 py-4 text-center border-t border-gray-800">
            <a href="/"
                class="text-gray-500 hover:text-accent transition-colors text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>
</body>

</html>
